name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check --output-format=github .

  test:
    name: Python audit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # torch/transformers are lazily imported by the runtime and not needed by
      # the unit suite; install only what test collection actually imports.
      - run: pip install -r requirements-dev.txt -r requirements-service.txt numpy opencv-python-headless faster-whisper
      # The Audit snapshot excludes local Provider/route state and generated APK
      # artifacts. Keep those three non-hermetic source tests visible here while
      # running every other Python test.
      - name: Run audit-safe Python suite
        run: |
          python -m pytest -q \
            --deselect backend/tests/unit/test_collaboration_participants.py::CollaborationParticipantRegistryTests::test_registry_exposes_dynamic_chat_participants_and_aliases \
            --deselect backend/tests/unit/test_command_gateway_collaboration.py::CommandGatewayCollaborationTests::test_runtime_model_name_with_slash_routes_only_to_canonical_participant \
            --deselect tests/test_mobile_link_receiver.py::MobileLinkReceiverTests::test_android_apk_manifest_contains_download_url_and_version

  frontend-syntax:
    name: Frontend JS syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: node --check all frontend JS
        run: |
          set -e
          found=0
          while IFS= read -r -d '' file; do
            node --check "$file"
            found=1
          done < <(find frontend -name '*.js' -not -path '*/node_modules/*' -print0)
          [ "$found" = "1" ] && echo "All frontend JS files parsed OK"

  desktop-build:
    name: Desktop build (WPF)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore SpiritKinAI.sln
      - run: dotnet build SpiritKinAI.sln -c Release --no-restore
      - run: dotnet test SpiritKinAI.sln -c Release --no-build
