name: SpiritKinTerminal
options:
  bundleIdPrefix: com.spiritkin
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  SpiritKinTerminal:
    type: application
    platform: iOS
    sources:
      - Sources
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spiritkin.terminal
        PRODUCT_NAME: SpiritKin
        INFOPLIST_FILE: Sources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Info.plist
    entitlements:
      path: Sources/SpiritKinTerminal.entitlements
    dependencies:
      - target: SpiritKinShare
        embed: true
  SpiritKinShare:
    type: app-extension
    platform: iOS
    sources:
      - ShareExtension
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.spiritkin.terminal.share
        PRODUCT_NAME: SpiritKinShare
        INFOPLIST_FILE: ShareExtension/Info.plist
        SKIP_INSTALL: YES
    info:
      path: ShareExtension/Info.plist
    entitlements:
      path: ShareExtension/SpiritKinShare.entitlements
