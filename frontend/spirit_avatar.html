<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SpiritKin Avatar Shell</title>
<script src="js/theme-bootstrap.js"></script>
<link rel="stylesheet" href="styles/fantasy-tokens.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:var(--fx-canvas);--card:var(--fx-surface);--line:var(--fx-line);--text:var(--fx-text);--muted:var(--fx-text-muted);--hot:var(--fx-primary);--ok:var(--fx-success);--warn:var(--fx-warning);--bad:var(--fx-danger)}body{min-height:100vh;background:var(--fx-canvas);color:var(--text);font-family:var(--font-ui);display:flex;justify-content:center}main{width:min(720px,100%);padding:14px;display:grid;gap:12px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:var(--fx-shadow-card);backdrop-filter:blur(10px)}#stage{position:relative;min-height:360px;display:grid;place-items:center;overflow:hidden}canvas{width:100%;height:360px;max-height:52vh}.top{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap}.brand{font-family:var(--font-brand-latin);font-weight:800;letter-spacing:.02em}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--fx-line-strong);border-radius:999px;padding:5px 9px;color:var(--fx-text);background:var(--fx-surface-2);font-size:12px}.pill.ok{border-color:var(--fx-success);color:var(--fx-success)}.pill.warn{border-color:var(--fx-warning);color:var(--fx-warning)}.pill.bad{border-color:var(--fx-danger);color:var(--fx-danger)}.muted{color:var(--muted);font-size:12px;line-height:1.55}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}input,textarea,button{background:var(--fx-surface-2);color:var(--text);border:1px solid var(--fx-line-strong);border-radius:12px;padding:10px 12px}textarea{width:100%;min-height:62px;resize:vertical}button{cursor:pointer;font-weight:700}button.primary{background:var(--fx-primary);border-color:var(--fx-primary);color:#fff}button.ok{background:var(--fx-success);border-color:var(--fx-success)}button.warn{background:var(--fx-warning);border-color:var(--fx-warning)}.status{position:absolute;left:14px;right:14px;bottom:14px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}.chat{display:flex;flex-direction:column;gap:7px;max-height:34vh;overflow:auto}.msg{padding:8px 10px;border-radius:13px;line-height:1.45;font-size:13px;max-width:88%;animation:fade .18s ease-out}.msg.user{align-self:flex-end;background:var(--fx-selected);color:var(--fx-text)}.msg.agent{align-self:flex-start;background:var(--fx-surface-2);color:var(--fx-text)}.msg.sys{align-self:center;background:var(--fx-surface);color:var(--fx-text-muted);max-width:100%;font-size:12px}@keyframes fade{from{opacity:.2;transform:translateY(4px)}to{opacity:1;transform:none}}@media(max-width:620px){main{padding:10px}.grid{grid-template-columns:1fr}#stage{min-height:330px}canvas{height:330px}.brand{font-size:14px}}
</style>
</head>
<body>
<main>
  <section class="card top"><div><div class="brand">SpiritKin · P2 Avatar Shell</div><div class="muted">角色前台只消费 runtime 事件；语音、ASR、TTS、权限由后端统一处理。</div></div><span id="conn" class="pill warn">ws: disconnected</span></section>
  <section id="stage" class="card"><canvas id="c"></canvas><div class="status"><span id="phase" class="pill">phase: silence_idle</span><span id="emotion" class="pill">emotion: neutral</span><span id="mouth" class="pill">mouth: idle</span></div></section>
  <section class="card grid"><input id="wsUrl" placeholder="ws://127.0.0.1:8765"><input id="apiUrl" placeholder="http://127.0.0.1:8788/command"><input id="token" placeholder="SPIRITKIN_MOBILE_TOKEN，可留空"><button id="connectBtn">连接事件桥</button></section>
  <section class="card"><textarea id="text" placeholder="文字输入 / 移动端指令，例如：继续推进 P2、确认执行、取消执行"></textarea><div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap"><button id="sendBtn" class="primary">发送到 Runtime</button><button id="confirmBtn" class="ok">确认执行</button><button id="cancelBtn" class="warn">取消执行</button></div><div id="hint" class="muted" style="margin-top:8px">等待 runtime 事件...</div></section>
  <section class="card"><div id="persona" class="muted">persona / memory / presence: 等待 runtime 事件...</div></section>
  <section class="card"><div id="chat" class="chat"><div class="msg sys">等待事件桥连接。也可以用输入框发送文本到 Command API。</div></div></section>
</main>
<script src="js/realtime_contract.js"></script>
<script src="js/realtime_bridge.js"></script>
<script>
const $=id=>document.getElementById(id), params=new URLSearchParams(location.search);
const canvas=$('c'),ctx=canvas.getContext('2d'),chat=$('chat'); let W=0,H=0,cx=0,cy=0,scale=1,t=0,speechTimers=[];
const state={phase:'silence_idle',emotion:'neutral',action:'idle',message:'',speaking:false,listening:false,waiting:false,interrupted:false,mouthShape:'idle',lastInput:'',agent:'--'};
const E={neutral:{color:'#60a5fa',eye:.12,mouth:.04},happy:{color:'#f59e0b',eye:.04,mouth:.08,blush:.28},thinking:{color:'#a78bfa',eye:.13,mouth:.03,px:.03},confused:{color:'#fb923c',eye:.10,mouth:.05,tilt:.08,py:-.02},listening:{color:'#34d399',eye:.09,mouth:.02},speaking:{color:'#38bdf8',eye:.08,mouth:.08},error:{color:'#fb7185',eye:.08,mouth:.04},waiting:{color:'#fbbf24',eye:.1,mouth:.03},interrupted:{color:'#fb7185',eye:.11,mouth:.06}};
const esc=window.SPIRITKIN_BRIDGE.escapeHtml;
const defaultWs=window.SPIRITKIN_BRIDGE.defaultWsUrl, defaultApi=window.SPIRITKIN_BRIDGE.defaultCommandUrl; function rgba(h,a){const x=h.replace('#','');const r=parseInt(x.length===3?x[0]+x[0]+x[1]+x[1]+x[2]+x[2]:x,16);return`rgba(${r>>16},${(r>>8)&255},${r&255},${a})`}
function resize(){const r=canvas.getBoundingClientRect();W=Math.max(280,r.width);H=Math.max(300,r.height);const d=Math.min(devicePixelRatio||1,params.get('mobile')==='1'?1.5:2);canvas.width=W*d;canvas.height=H*d;ctx.setTransform(d,0,0,d,0,0);cx=W/2;cy=H*.45;scale=Math.min(W,H)/430} addEventListener('resize',resize); setTimeout(resize,0);
function mouthOpen(){const m=state.mouthShape; if(m==='A'||m==='ah')return .13; if(m==='O'||m==='ou')return .10; if(m==='I'||m==='ih')return .055; if(state.speaking)return .055+Math.abs(Math.sin(t*12))*.055; return (E[state.emotion]||E.neutral).mouth}
function draw(){requestAnimationFrame(draw);t+=.016;ctx.clearRect(0,0,W,H);const e=E[state.interrupted?'interrupted':state.waiting?'waiting':state.speaking?'speaking':state.listening?'listening':state.emotion]||E.neutral,s=scale,fl=Math.sin(t*.8)*s*5,br=1+Math.sin(t*1.2)*.015,blink=Math.abs(Math.sin(t*.63))>.965?.015:e.eye,tilt=(e.tilt||0)*Math.sin(t*.5);ctx.save();ctx.translate(cx,cy+fl);ctx.rotate(tilt);let g=ctx.createRadialGradient(0,-s*35,s*10,0,0,s*190);g.addColorStop(0,rgba(e.color,.14));g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(-W,-H,W*2,H*2);ctx.beginPath();ctx.moveTo(-s*88,s*168);ctx.quadraticCurveTo(-s*68,s*88,-s*30,s*74);ctx.lineTo(s*30,s*74);ctx.quadraticCurveTo(s*68,s*88,s*88,s*168);ctx.quadraticCurveTo(s*58,s*198,0,s*198);ctx.quadraticCurveTo(-s*58,s*198,-s*88,s*168);ctx.fillStyle='#111c33';ctx.fill();ctx.beginPath();ctx.arc(0,-s*10,s*73*br,0,Math.PI*2);ctx.fillStyle='#18213c';ctx.fill();ctx.beginPath();ctx.arc(0,-s*28,s*77,Math.PI*1.08,Math.PI*1.92);ctx.arc(0,-s*58,s*38,Math.PI*.25,Math.PI*.75);ctx.fillStyle='#0b1024';ctx.fill();[-1,1].forEach(sd=>{const ex=sd*s*24,ey=-s*10;ctx.beginPath();ctx.ellipse(ex,ey,s*18,s*16,0,0,Math.PI*2);ctx.fillStyle='#eaf6ff';ctx.fill();ctx.beginPath();ctx.arc(ex+(e.px||0)*s*sd,ey+(e.py||0)*s,s*5.5,0,Math.PI*2);ctx.fillStyle=e.color;ctx.fill();ctx.beginPath();ctx.rect(ex-s*22,ey-s*20,s*44,s*20*(1-blink/.14));ctx.fillStyle='#18213c';ctx.fill()});if(e.blush){[-1,1].forEach(sd=>{ctx.beginPath();ctx.ellipse(sd*s*39,s*9,s*14,s*8,0,0,Math.PI*2);ctx.fillStyle=`rgba(255,110,140,${e.blush})`;ctx.fill()})}ctx.beginPath();ctx.ellipse(0,s*24,s*24,mouthOpen()*s*100,0,0,Math.PI*2);ctx.fillStyle='#1a0f21';ctx.fill();ctx.restore();if(state.listening||state.waiting){for(let i=0;i<3;i++){const r=s*95+i*s*24+Math.sin(t*3+i)*s*8;ctx.beginPath();ctx.arc(cx,cy+fl,r,0,Math.PI*2);ctx.strokeStyle=rgba(e.color,.28-i*.07);ctx.lineWidth=s*2;ctx.stroke()}}}
function addMsg(role,text){const el=document.createElement('div');el.className='msg '+role;el.innerHTML=esc(String(text||'').slice(0,600));chat.appendChild(el);chat.scrollTop=chat.scrollHeight;while(chat.children.length>24)chat.firstChild.remove()}
function render(){const phase=state.phase||'silence_idle';state.listening=phase.includes('listen')||phase==='attentive_wait';state.waiting=phase.includes('confirmation')||phase==='waiting_confirmation';state.interrupted=phase.includes('interrupt');$('phase').textContent='phase: '+phase;$('emotion').textContent='emotion: '+(state.emotion||'neutral');$('mouth').textContent='mouth: '+(state.mouthShape||'idle');$('hint').textContent=state.message||`agent=${state.agent} action=${state.action}`;$('confirmBtn').style.display=state.waiting?'inline-block':'none';$('cancelBtn').style.display=state.waiting?'inline-block':'none'}
function applyAvatar(p={}){const a=p.payload||p;Object.assign(state,{emotion:a.emotion||state.emotion,action:a.action||state.action,message:a.message||state.message,speaking:!!a.speaking,agent:a.agent_name||state.agent});if(a.performance_phase)state.phase=a.performance_phase;render()}
function applyPerformance(p={}){state.phase=p.phase||state.phase;state.message=p.message||state.message;render(); if(p.phase)addMsg('sys',`${p.phase}: ${p.message||''}`)}
function clearSpeechTimers(){speechTimers.forEach(clearTimeout);speechTimers=[]}
function applySpeech(p={}){const v=p.payload||p, delay=Math.max(0,Number(v.timestamp_ms||0));const timer=setTimeout(()=>{state.mouthShape=v.mouth_shape||v.viseme||v.phoneme||'open';render()},delay);speechTimers.push(timer)}
function applySpeechLifecycle(type,p={}){if(type==='speech.started'){state.phase='speaking';state.speaking=true;state.message='正在播报';render()}else if(type==='speech.interrupted'){clearSpeechTimers();state.phase='interrupted';state.speaking=false;state.mouthShape='idle';state.message='播报已中断';render()}else if(type==='speech.ended'){state.speaking=false;state.mouthShape='idle';state.phase=p.interrupted?'interrupted':'attentive_wait';render()}}
function applyEvent(ev){if(!ev)return;if(Array.isArray(ev)){ev.forEach(applyEvent);return}if(ev.type==='runtime.snapshot'){(ev.payload?.events||[]).forEach(applyEvent);return}const p=ev.payload||ev;if(ev.type==='avatar.state')applyAvatar(p);else if(ev.type==='performance.state')applyPerformance(p);else if(ev.type==='speech.phoneme'||ev.type==='speech.viseme')applySpeech(p);else if(ev.type==='speech.started'||ev.type==='speech.ended'||ev.type==='speech.interrupted')applySpeechLifecycle(ev.type,p);else if(ev.type==='user_input'){clearSpeechTimers();state.lastInput=p.text||'';state.phase='listening';state.mouthShape='idle';addMsg('user',p.text||'');render()}else if(ev.type==='assistant.message'){clearSpeechTimers();state.phase=p.requires_confirmation?'waiting_confirmation':'speaking';state.waiting=!!p.requires_confirmation;state.agent=p.agent_name||state.agent;state.emotion=p.emotion||state.emotion;state.action=p.action||state.action;addMsg('agent',p.spoken_text||p.text||'');render()}else if(ev.type==='assistant.confirmation_requested'){state.phase='waiting_confirmation';state.waiting=true;state.message=p.spoken_text||p.text||'等待确认';addMsg('sys',state.message);render()}else if(ev.type==='assistant.execution_updated'){state.phase=p.success===false?'error':'success';state.speaking=false;addMsg('sys',`${p.target||'tool'}.${p.operation||''}: ${p.success===false?'failed':'ok'}`);render()}else if(ev.type==='memory.updated'||ev.type==='presence.updated'||ev.type==='personality.updated'){$('persona').textContent=JSON.stringify(p,null,2).slice(0,500)}}
const conn=window.SPIRITKIN_BRIDGE.createRealtimeConnection({getUrl:()=>{const url=$('wsUrl').value.trim()||defaultWs();localStorage.setItem('spiritkin_avatar_ws',url);return url},getToken:()=>($('token').value.trim()||localStorage.getItem('spiritkin_avatar_token')||new URLSearchParams(location.search).get('token')||''),onEvent:applyEvent,onStatus:status=>{const pill=$('conn');if(status==='connecting'){pill.className='pill warn';pill.textContent='ws: connecting'}else if(status==='connected'){pill.className='pill ok';pill.textContent='ws: connected';addMsg('sys','事件桥已连接')}else if(status==='error'){pill.className='pill bad';pill.textContent='ws: error'}else if(status==='reconnecting'){pill.className='pill warn';pill.textContent='ws: reconnecting'}}});
function connect(){conn.connect()}
async function send(text){text=(text||$('text').value).trim();if(!text)return;const api=$('apiUrl').value.trim()||defaultApi(),token=$('token').value.trim();localStorage.setItem('spiritkin_avatar_api',api);localStorage.setItem('spiritkin_avatar_token',token);addMsg('user',text);$('text').value='';state.phase='thinking';state.message='已发送，等待 runtime 回复';render();try{const res=await window.SPIRITKIN_BRIDGE.postCommand(api,{text,channel:params.get('channel')||'avatar',metadata:{frontend:'spirit_avatar',p2_shell:true}},{token});if(!res.ok)throw new Error(res.data.error||`HTTP ${res.status}`);if(res.data.reply)applyEvent({type:'assistant.message',payload:res.data.reply})}catch(e){state.phase='error';state.message=e.message||String(e);addMsg('sys','发送失败：'+state.message);render()}}
$('wsUrl').value=params.get('ws')||localStorage.getItem('spiritkin_avatar_ws')||defaultWs();$('apiUrl').value=params.get('cmd')||localStorage.getItem('spiritkin_avatar_api')||defaultApi();$('token').value=params.get('token')||localStorage.getItem('spiritkin_avatar_token')||'';$('connectBtn').onclick=connect;$('sendBtn').onclick=()=>send();$('confirmBtn').onclick=()=>send('确认执行');$('cancelBtn').onclick=()=>send('取消执行');$('text').onkeydown=e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))send()};render();draw();connect();
</script>
</body>
</html>
