/* Atelier desktop signature copied from concept 01: separate top stage light and
   floor reflection so the warm light remains readable over the real 3D room. */
body.embed #stage::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:2;
  pointer-events:none;
  background:radial-gradient(70% 46% at 50% 6%,rgba(233,149,65,.40) 0,transparent 62%);
  mix-blend-mode:screen;
  opacity:.55;
  transform:scale(1);
  animation:atelier-hearth-breath 6.5s ease-in-out infinite;
}
.atelier-hearth-floor{display:none}

  display:block;
  position:absolute;
  left:12%;
  right:12%;
  bottom:6%;
  height:14%;
  z-index:2;
  pointer-events:none;
  border-radius:50%;
  background:radial-gradient(closest-side,rgba(233,149,65,.30),transparent 74%);

  opacity:.4;
  transform:scaleX(.92);
  animation:atelier-hearth-floor 6.5s ease-in-out infinite;
