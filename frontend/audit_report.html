<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>SpiritKin Audit Report</title>
<script src="js/theme-bootstrap.js"></script>
<link rel="stylesheet" href="styles/fantasy-tokens.css">
<style>:root{--bg:var(--fx-canvas);--card:var(--fx-surface);--line:var(--fx-line);--text:var(--fx-text);--muted:var(--fx-text-muted);--ok:var(--fx-success);--warn:var(--fx-warning);--bad:var(--fx-danger)}*{box-sizing:border-box}body{margin:0;font-family:var(--font-ui);background:var(--fx-canvas);color:var(--text)}main{max-width:1220px;margin:0 auto;padding:24px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}.card{background:var(--fx-surface);border:1px solid var(--line);border-radius:18px;padding:16px}.label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.value{font-size:28px;font-weight:900;margin-top:6px}.muted{color:var(--muted)}button,input,textarea{background:var(--fx-surface-2);color:var(--text);border:1px solid var(--fx-line-strong);border-radius:10px;padding:10px 12px}button{cursor:pointer;font-weight:800}.row{display:flex;gap:8px;flex-wrap:wrap}.ok{color:var(--ok)}.warn{color:var(--warn)}.bad{color:var(--bad)}.pill{display:inline-flex;border:1px solid var(--fx-line-strong);border-radius:999px;padding:4px 9px;margin:2px;background:var(--fx-surface-2)}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border-top:1px solid var(--fx-line);padding:8px;text-align:left;vertical-align:top}.panel{max-height:500px;overflow:auto}.mono{font-family:var(--font-mono)}textarea{width:100%;min-height:170px}.link{color:var(--fx-primary)}</style></head>
<body><main><h1>权限 / 审计详情</h1><p class="muted">导出示例：在 Python 中调用 <code>audit_log.export_jsonl("frontend/audit_export.jsonl")</code>，或直接把审计 JSONL 粘贴到下方。</p>
<section class="card"><div class="label">加载 JSONL</div><div class="row" style="margin-top:10px"><input id="url" style="flex:1" value="audit_export.jsonl"><button id="loadUrl">加载 URL</button><input id="file" type="file" accept=".jsonl,.json"><button id="parseText">解析粘贴 JSONL</button></div><textarea id="text" placeholder='每行一条 AuditRecord JSON，例如 {"event_type":"tool_execution","target":"software","operation":"list_installed"}'></textarea><p id="status" class="muted">等待加载审计日志。</p></section>
<section class="grid" style="margin-top:16px"><div class="card"><div class="label">Total</div><div id="total" class="value">--</div></div><div class="card"><div class="label">High Risk</div><div id="high" class="value">--</div></div><div class="card"><div class="label">Failures</div><div id="fail" class="value">--</div></div><div class="card"><div class="label">Mobile/Public</div><div id="remote" class="value">--</div></div></section>
<section class="grid" style="margin-top:16px"><div class="card"><div class="label">Event Types</div><div id="events" class="muted">--</div></div><div class="card"><div class="label">Targets</div><div id="targets" class="muted">--</div></div><div class="card"><div class="label">Policy Decisions</div><div id="policies" class="muted">--</div></div></section>
<section class="card" style="margin-top:16px"><div class="label">Records</div><div class="row" style="margin:10px 0"><input id="filter" style="flex:1" placeholder="过滤 actor/channel/target/operation/message"><button id="badOnly">只看失败/高风险</button><button id="all">全部</button></div><div class="panel"><table class="table"><thead><tr><th>Time</th><th>Event</th><th>Actor/Channel</th><th>Target</th><th>Risk</th><th>Success</th><th>Message</th></tr></thead><tbody id="rows"></tbody></table></div></section>
</main><script>
const $=id=>document.getElementById(id); let records=[], badOnly=false; function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))} function countBy(key){const m={}; for(const r of records){const v=key(r)||'--'; m[v]=(m[v]||0)+1} return m} function pills(m,cls=''){return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([k,v])=>`<span class="pill ${cls}">${esc(k)} × ${v}</span>`).join(' ')||'--'} function parseLines(text){const out=[]; for(const line of text.split(/\r?\n/)){const s=line.trim(); if(!s) continue; try{const v=JSON.parse(s); if(v&&typeof v==='object') out.push(v)}catch(_){}} return out}
function render(){ $('total').textContent=records.length; const high=records.filter(r=>r.risk_level==='high').length, fail=records.filter(r=>r.success===false).length, mobile=records.filter(r=>r.channel==='mobile'||r.channel==='public'||r.actor==='command_gateway').length; $('high').textContent=high; $('high').className=`value ${high?'warn':'ok'}`; $('fail').textContent=fail; $('fail').className=`value ${fail?'bad':'ok'}`; $('remote').textContent=mobile; $('events').innerHTML=pills(countBy(r=>r.event_type)); $('targets').innerHTML=pills(countBy(r=>`${r.target||'--'}.${r.operation||'--'}`)); $('policies').innerHTML=pills(countBy(r=>r.policy_decision_id||r.capability_id||'')); renderRows(); }
function renderRows(){const q=$('filter').value.toLowerCase(); const rows=records.filter(r=>{const txt=JSON.stringify(r).toLowerCase(); const bad=r.success===false||r.risk_level==='high'||r.event_type==='rate_limit_violation'; return (!q||txt.includes(q))&&(!badOnly||bad)}); $('rows').innerHTML=rows.map(r=>`<tr><td class="mono">${r.timestamp?new Date(r.timestamp*1000).toLocaleString():'--'}</td><td>${esc(r.event_type)}</td><td>${esc(r.actor||'--')}<br><span class="muted">${esc(r.channel||'--')}</span></td><td class="mono">${esc(r.target||'--')}.${esc(r.operation||'--')}</td><td class="${r.risk_level==='high'?'warn':''}">${esc(r.risk_level||'--')}</td><td class="${r.success===false?'bad':r.success===true?'ok':''}">${r.success===false?'false':r.success===true?'true':'--'}</td><td>${esc(r.message||'')}<br><span class="muted mono">${esc(r.audit_id||'')}</span></td></tr>`).join('')}
async function loadUrl(){try{const res=await fetch($('url').value.trim(),{cache:'no-store'}); if(!res.ok) throw new Error(`HTTP ${res.status}`); $('text').value=await res.text(); loadText();}catch(e){$('status').innerHTML=`<span class="bad">加载失败：${esc(e.message||e)}</span>`}} function loadText(){records=parseLines($('text').value); $('status').innerHTML=`<span class="ok">已解析 ${records.length} 条记录</span>`; render()} $('loadUrl').onclick=loadUrl; $('parseText').onclick=loadText; $('filter').oninput=renderRows; $('badOnly').onclick=()=>{badOnly=true;renderRows()}; $('all').onclick=()=>{badOnly=false;$('filter').value='';renderRows()}; $('file').onchange=async e=>{const f=e.target.files[0]; if(!f)return; $('text').value=await f.text(); loadText()}; loadUrl();
</script></body></html>
